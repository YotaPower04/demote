# Flatpak manifest for Demote — a universal TV/streamer remote for the Steam Deck.
#
# Build locally (needs flatpak-builder + the KDE 6.11 runtime/SDK):
#   flatpak install flathub org.kde.Platform//6.11 org.kde.Sdk//6.11
#   flatpak-builder --user --install --force-clean build packaging/io.github.yotapower04.Demote.yml
# For a quick local build, swap the app module's source to `type: dir path: ..`.
app-id: io.github.yotapower04.Demote
runtime: org.kde.Platform
runtime-version: '6.11'
sdk: org.kde.Sdk
command: demote

finish-args:
  - --share=network                 # LAN discovery + device control + DLNA server
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --device=input                  # evdev gamepad read + EVIOCGRAB exclusive grab
  - --filesystem=xdg-videos:ro      # drag-and-drop cast of local video files
  - --filesystem=xdg-download:ro

modules:
  # Vendored Python wheels (PySide6, androidtvremote2, websockets, …), pinned
  # with sha256 for an offline build. Regenerate with packaging/gen-python-deps.py.
  - python3-deps.yaml

  - name: demote
    buildsystem: simple
    build-commands:
      # App code
      - install -d ${FLATPAK_DEST}/share/demote
      - cp -r tvremote main.py ${FLATPAK_DEST}/share/demote/
      # Launcher
      - install -Dm755 packaging/demote.sh ${FLATPAK_DEST}/bin/demote
      # Desktop entry, AppStream metainfo
      - install -Dm644 packaging/io.github.yotapower04.Demote.desktop
        ${FLATPAK_DEST}/share/applications/io.github.yotapower04.Demote.desktop
      - install -Dm644 packaging/io.github.yotapower04.Demote.metainfo.xml
        ${FLATPAK_DEST}/share/metainfo/io.github.yotapower04.Demote.metainfo.xml
      # Icons (hicolor)
      - install -Dm644 packaging/icons/64.png
        ${FLATPAK_DEST}/share/icons/hicolor/64x64/apps/io.github.yotapower04.Demote.png
      - install -Dm644 packaging/icons/128.png
        ${FLATPAK_DEST}/share/icons/hicolor/128x128/apps/io.github.yotapower04.Demote.png
      - install -Dm644 packaging/icons/256.png
        ${FLATPAK_DEST}/share/icons/hicolor/256x256/apps/io.github.yotapower04.Demote.png
      - install -Dm644 packaging/icons/512.png
        ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/io.github.yotapower04.Demote.png
      - install -Dm644 packaging/icon.svg
        ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.yotapower04.Demote.svg
    sources:
      # Local build: clone the committed working tree (tracked files only, so no
      # .venv / caches). For the Flathub PR, replace with the published tag:
      #   - type: git
      #     url: https://github.com/YotaPower04/demote.git
      #     tag: v1.0.0
      #     commit: <sha>
      - type: git
        path: ..
        branch: main
