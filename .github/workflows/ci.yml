name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # PySide6's offscreen platform still dlopen's a few system libs.
      - name: Install Qt runtime libs
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Ruff
        run: ruff check .

      - name: Tests (headless)
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q

  flatpak:
    runs-on: ubuntu-latest
    # The app-id org segment is still a placeholder; treat the build as advisory
    # until it is finalized and the manifest source is pinned to a git tag.
    continue-on-error: true
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-6.11
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: demote.flatpak
          manifest-path: packaging/io.github.yotapower04.Demote.yml
          cache-key: flatpak-builder-${{ github.sha }}
